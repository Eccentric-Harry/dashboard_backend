spring.application.name=backend

# MongoDB Configuration
# Atlas Shared Tier (M0) requires explicit database specification and health check disabling
# URI format: mongodb+srv://user:pwd@host/database?params
spring.mongodb.uri=mongodb+srv://harinathrao13_db_user:oQcgOC69QRDWIVsf@cluster0.5imoofj.mongodb.net/personal_dashboard?retryWrites=true&w=majority&authSource=admin
spring.mongodb.database=personal_dashboard

# Disable MongoDB health indicator - it tries to access restricted databases on Atlas
# Free tier (M0) blocks access to local/admin databases - this prevents the 8000 error
management.health.mongodb.enabled=false

# Keep health endpoint enabled
management.endpoints.web.exposure.include=health,info,metrics

# Strava API Configuration
# Get these from https://www.strava.com/settings/api
# Or set via environment variable: export STRAVA_ACCESS_TOKEN=your_token_here
strava.api.base-url=https://www.strava.com/api/v3
strava.api.access-token=${STRAVA_ACCESS_TOKEN:}

# SpringDoc OpenAPI (Swagger UI) Configuration
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
spring.profiles.active=local
